site_name: Fabric Events
site_description: Practical resources for building event-driven solutions with Microsoft Fabric
site_url: https://microsoft.github.io/fabric-events/
repo_url: https://github.com/microsoft/fabric-events
repo_name: microsoft/fabric-events
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/microsoft/fabric-events/discussions
      name: Join the discussion on GitHub

copyright: 'Made with <span class="heart">&#10084;</span> from the Fabric Events team'

extra_css:
  - stylesheets/extra.css

plugins:
  - search

nav:
  - Home: home/index.md
  - Business Events:
    - Introduction:
      - What are Business Events?: business-events/introduction/what-are-business-events.md
      - Architecture Overview: business-events/introduction/architecture-overview.md
      - Event Schema: business-events/introduction/event-schema.md
    - Design Guides:
      - Overview: business-events/design-guides/index.md
      - Decision Guide: business-events/introduction/decision-guide.md
      - Structuring Payloads: business-events/design-guides/structuring-payloads.md
      - Handling Retries: business-events/design-guides/handling-retries.md
      - Schema Versioning: business-events/design-guides/schema-versioning.md
      - Multi-Consumer Fanout: business-events/design-guides/multi-consumer-fanout.md
    - Recipes:
      - Overview: business-events/recipes/index.md
      - Chain Two Business Events: business-events/recipes/chain-two-business-events.md
      - Batch Publish from a Notebook: business-events/recipes/batch-publish-notebook.md
      - Batch Publish from a User Data Function: business-events/recipes/batch-publish-udf.md
    - Scenarios:
      - Overview: business-events/scenarios/index.md
      - "Scenario 1: Sales Volume Alert": business-events/scenarios/scenario-01-sales-volume-alert/README.md
      - "Scenario 2: Low Stock Threshold": business-events/scenarios/scenario-02-low-stock-threshold/README.md
      - "Scenario 3: Real-Time Stream Alert": business-events/scenarios/scenario-03-high-value-transaction/README.md
      - "Scenario 4: Data Lineage Audit": business-events/scenarios/scenario-04-pipeline-audit/README.md
      - "Scenario 5: Business Automation Loop": business-events/scenarios/scenario-05-loyalty-milestone/README.md
  - Fabric Events: fabric-events/index.md
  - Azure Events: azure-events/index.md
